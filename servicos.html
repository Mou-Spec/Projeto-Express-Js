<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços — EcoGuia</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/servicos.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">    
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/Logo.png" alt="EcoGuia" height="40">
                EcoGuia
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro.html">Cadastro</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="servicos.html">Serviços</a> <!-- NOVO -->
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sobre.html">Sobre</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <h1 class="titulo-servicos">Pesquisar Formas de Descarte</h1>

    <div class="container-servicos">
        <input type="text" id="campoPesquisa" class="campo-pesquisa" placeholder="Exemplo: garrafa pet, papelão, vidro...">
        <button id="botaoPesquisar" class="botao-pesquisar">🔍 Pesquisar</button>
    </div>

    <!-- Sugestões de pesquisa -->
    <div class="sugestoes">
        <div class="sugestao-item" onclick="document.getElementById('campoPesquisa').value = 'garrafa pet'; document.getElementById('botaoPesquisar').click();">garrafa pet</div>
        <div class="sugestao-item" onclick="document.getElementById('campoPesquisa').value = 'papelão'; document.getElementById('botaoPesquisar').click();">papelão</div>
        <div class="sugestao-item" onclick="document.getElementById('campoPesquisa').value = 'vidro'; document.getElementById('botaoPesquisar').click();">vidro</div>
        <div class="sugestao-item" onclick="document.getElementById('campoPesquisa').value = 'alumínio'; document.getElementById('botaoPesquisar').click();">alumínio</div>
        <div class="sugestao-item" onclick="document.getElementById('campoPesquisa').value = 'eletrônico'; document.getElementById('botaoPesquisar').click();">eletrônico</div>
    </div>

    <div id="resultado" class="resultado-oculto">
        <!-- O conteúdo será preenchido pelo JavaScript -->
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/servicos.js"></script>
</body>
</html>
